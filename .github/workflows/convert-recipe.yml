name: Convert recipe from scan

on:
  push:
    branches: [main]
    paths:
      - 'recipes-site/public/skannar/**'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new images
        id: find-images
        run: |
          NEW_IMAGES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'recipes-site/public/skannar/*' | grep -iE '\.(jpg|jpeg|png|gif|webp|heic)$' || true)
          if [ -z "$NEW_IMAGES" ]; then
            echo "No new images found."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found new images:"
            echo "$NEW_IMAGES"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.find-images.outputs.found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.find-images.outputs.found == 'true'
        run: pip install anthropic

      - name: Convert images to recipes
        if: steps.find-images.outputs.found == 'true'
        id: convert
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          RESULTS=$(python .github/scripts/convert_recipe.py)
          echo "recipes=$RESULTS" >> "$GITHUB_OUTPUT"

      - name: Create PRs
        if: steps.find-images.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          RECIPES='${{ steps.convert.outputs.recipes }}'
          COUNT=$(echo "$RECIPES" | jq length)

          for i in $(seq 0 $((COUNT - 1))); do
            TITLE=$(echo "$RECIPES" | jq -r ".[$i].title")
            SLUG=$(echo "$RECIPES" | jq -r ".[$i].slug")
            IMAGE=$(echo "$RECIPES" | jq -r ".[$i].image")
            NEW_IMAGE=$(echo "$RECIPES" | jq -r ".[$i].new_image")
            MD_FILE=$(echo "$RECIPES" | jq -r ".[$i].md_file")
            CHANGES=$(echo "$RECIPES" | jq -r ".[$i].changes")
            BRANCH="recipe/${SLUG}"

            echo "=== Creating PR for: $TITLE ==="

            # Build the changes section for the PR body
            CHANGES_SECTION=""
            CHANGES_COUNT=$(echo "$CHANGES" | jq length)
            if [ "$CHANGES_COUNT" -gt 0 ]; then
              CHANGES_SECTION="
          ### Endringar gjort av AI-korrektur

          Desse antakingane/rettingane vart gjort automatisk:

          "
              for j in $(seq 0 $((CHANGES_COUNT - 1))); do
                CHANGE=$(echo "$CHANGES" | jq -r ".[$j]")
                CHANGES_SECTION="${CHANGES_SECTION}- ${CHANGE}
          "
              done
            fi

            # Start fresh from main
            git checkout main
            git checkout -b "$BRANCH"

            # Stage the renamed image and new markdown file
            git add "recipes-site/public/skannar/${NEW_IMAGE}" "recipes-site/src/content/oppskrifter/${MD_FILE}"
            # Stage the removal of the original image if it was renamed
            if [ "$IMAGE" != "$NEW_IMAGE" ]; then
              git add "recipes-site/public/skannar/${IMAGE}"
            fi

            git commit -m "Add recipe: ${TITLE}

          Co-Authored-By: Claude <noreply@anthropic.com>"

            git push origin "$BRANCH"

            gh pr create \
              --title "Ny oppskrift: ${TITLE}" \
              --body "## Ny oppskrift: ${TITLE}

          Automatisk transkribering frå \`${IMAGE}\`.
          ${CHANGES_SECTION}
          ### Sjekkliste

          - [ ] Tittelen er riktig
          - [ ] Ingrediensane stemmer
          - [ ] Framgangsmåten er komplett
          - [ ] Kategori og taggar passar

          🤖 Generert med Claude API"

            echo "PR created for: $TITLE"
          done
