name: Convert recipe from scan

on:
  push:
    branches: [main]
    paths:
      - 'recipes-site/public/skannar/**'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new images
        id: find-images
        run: |
          # Find image files added in the latest commit
          NEW_IMAGES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'recipes-site/public/skannar/*' | grep -iE '\.(jpg|jpeg|png|gif|webp|heic)$' || true)
          if [ -z "$NEW_IMAGES" ]; then
            echo "No new images found."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Found new images:"
            echo "$NEW_IMAGES"
            echo "found=true" >> "$GITHUB_OUTPUT"
            # Save to file for multi-line support
            echo "$NEW_IMAGES" > /tmp/new_images.txt
          fi

      - name: Setup Python
        if: steps.find-images.outputs.found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.find-images.outputs.found == 'true'
        run: pip install anthropic

      - name: Convert images to recipes
        if: steps.find-images.outputs.found == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/convert_recipe.py

      - name: Create pull request
        if: steps.find-images.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="recipe/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add recipes-site/src/content/oppskrifter/ recipes-site/public/skannar/

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "$(cat <<'EOF'
          Add new recipe(s) from scanned images

          Auto-generated from uploaded scans using Claude API.

          Co-Authored-By: Claude <noreply@anthropic.com>
          EOF
          )"

          git push origin "$BRANCH"

          gh pr create \
            --title "Ny oppskrift frå skann" \
            --body "$(cat <<'EOF'
          ## Ny oppskrift

          Denne PR-en vart automatisk generert frå opplasta skannar.

          Sjekk at:
          - [ ] Tittelen er riktig
          - [ ] Ingrediensane stemmer
          - [ ] Framgangsmåten er komplett
          - [ ] Kategori og taggar passar

          🤖 Generert med Claude API
          EOF
          )"
