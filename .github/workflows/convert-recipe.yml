name: Convert recipe from scan

on:
  push:
    branches: [main]
    paths:
      - 'recipes-site/public/skannar/**'
  workflow_dispatch:
    inputs:
      images:
        description: 'Comma-separated image filenames to process (e.g. PXL_123.jpg,PXL_456.jpg). Leave empty to auto-detect from last commit.'
        required: false
        default: ''

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new images
        id: find-images
        run: |
          if [ -n "${{ inputs.images }}" ]; then
            echo "Using manually specified images: ${{ inputs.images }}"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            NEW_IMAGES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'recipes-site/public/skannar/*' | grep -iE '\.(jpg|jpeg|png|gif|webp|heic)$' || true)
            if [ -z "$NEW_IMAGES" ]; then
              echo "No new images found."
              echo "found=false" >> "$GITHUB_OUTPUT"
            else
              echo "Found new images:"
              echo "$NEW_IMAGES"
              echo "found=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Setup Python
        if: steps.find-images.outputs.found == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.find-images.outputs.found == 'true'
        run: pip install anthropic

      - name: Convert images to recipes
        if: steps.find-images.outputs.found == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IMAGE_NAMES: ${{ inputs.images }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python .github/scripts/convert_recipe.py > /tmp/recipes.json

      - name: Create PRs
        if: steps.find-images.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RECIPES=$(cat /tmp/recipes.json)
          COUNT=$(echo "$RECIPES" | jq length)

          for i in $(seq 0 $((COUNT - 1))); do
            TITLE=$(echo "$RECIPES" | jq -r ".[$i].title")
            IMAGE=$(echo "$RECIPES" | jq -r ".[$i].image")
            BRANCH=$(echo "$RECIPES" | jq -r ".[$i].branch")
            CHANGES=$(echo "$RECIPES" | jq -c ".[$i].changes")

            echo "=== Creating PR for: $TITLE ==="

            # Build changes section if any
            CHANGES_SECTION=""
            CHANGES_COUNT=$(echo "$CHANGES" | jq length)
            if [ "$CHANGES_COUNT" -gt 0 ]; then
              CHANGES_LIST=$(echo "$CHANGES" | jq -r '.[] | "- " + .')
              CHANGES_SECTION="$(printf '\n### Endringar gjort av AI-korrektur\n\nDesse antakingane/rettingane vart gjort automatisk:\n\n%s\n' "$CHANGES_LIST")"
            fi

            gh pr create \
              --title "Ny oppskrift: ${TITLE}" \
              --head "$BRANCH" \
              --base main \
              --body "$(printf '## Ny oppskrift: %s\n\nAutomatisk transkribering frå `%s`.%s\n### Sjekkliste\n\n- [ ] Tittelen er riktig\n- [ ] Ingrediensane stemmer\n- [ ] Framgangsmåten er komplett\n- [ ] Kategori og taggar passar\n\n🤖 Generert med Claude API' "$TITLE" "$IMAGE" "$CHANGES_SECTION")"

            echo "PR created for: $TITLE"
          done
